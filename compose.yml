version: '3.4'
services:
  # floci is a replacement for localstack. It emulates AWS resources (sqs, sns, s3 etc) for local development
  # See: https://floci.io for more details
  floci:
    image: hectorvent/floci:latest-aws
    ports:
      - '4566:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:7.0.28
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.hello().ok']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  case-management-backend:
    build: ./
    container_name: case-management-backend
    ports:
      - '8085:8085'
    links:
      - 'floci:floci'
      - 'mongodb:mongodb'
    depends_on:
      floci:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - 'compose/aws.env'
    environment:
      ASPNETCORE_URLS: http://+:8085
      Mongo__DatabaseUri: mongodb://mongodb:27017/
      Mongo__DatabaseName: epr-register-case-management
    networks:
      - cdp-tenant

################################################################################

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
