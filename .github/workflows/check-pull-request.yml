name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  schedule:
    # Nightly run picks up template drift between releases even when no
    # PR has touched the codebase. UTC.
    - cron: '0 3 * * *'

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0
      - name: Lint (dotnet format)
        run: dotnet format style --verify-no-changes
      - name: Test
        # Exclude the live-Notify contract tests; they need an API key
        # and are run by the dedicated notify-contract job below.
        run: dotnet test --filter "Category!=NotifyContract"

  notify-contract:
    name: Notify Template Contract Tests
    runs-on: ubuntu-latest
    # Only run when the API key secret is configured. Without the secret
    # the tests would all skip; gating the whole job keeps the PR check
    # surface honest (no "passed by skipping" entries).
    if: ${{ vars.NOTIFY_CONTRACT_TESTS_ENABLED == 'true' || github.event_name == 'schedule' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0
      - name: Run Notify template contract tests
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: dotnet test --filter "Category=NotifyContract"

  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for matching e2e test branch
        id: e2e-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-register-enrol-mgmt-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build management-be docker image
        run: docker build -t defradigital/epr-register-enrol-management-be:${{ github.sha }} .

      - name: Run e2e tests on ${{ steps.e2e-branch.outputs.ref }}
        uses: DEFRA/epr-register-enrol-mgmt-tests/run-journey-tests@main
        with:
          management-be: ${{ github.sha }}
          branch: ${{ steps.e2e-branch.outputs.ref }}

    ## SonarCloud
    ## Uncomment to unable SonarCloud scan
    ## Requires project to be set up in SonarCloud
    ## and the SonarCloud token to be set in the repository secrets
