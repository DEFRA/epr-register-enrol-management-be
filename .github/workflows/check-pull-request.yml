name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0
      - name: Lint (dotnet format)
        run: dotnet format style --verify-no-changes
      - name: Test
        run: dotnet test

  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for matching e2e test branch
        id: e2e-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-register-enrol-mgmt-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build management-be docker image
        run: docker build -t defradigital/epr-register-enrol-management-be:${{ github.sha }} .

      - name: Check for matching management-fe branch
        id: fe-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --heads https://github.com/DEFRA/epr-register-enrol-management-fe.git "$BRANCH" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout and build matching management-fe
        if: steps.fe-branch.outputs.exists == 'true'
        id: build-fe
        run: |
          git clone --branch ${{ github.head_ref }} --depth 1 https://github.com/DEFRA/epr-register-enrol-management-fe.git _fe
          cd _fe
          SHA=$(git rev-parse --short HEAD)
          docker build -t defradigital/epr-register-enrol-management-fe:$SHA .
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"

      - name: Run e2e tests on ${{ steps.e2e-branch.outputs.ref }}
        uses: DEFRA/epr-register-enrol-mgmt-tests/run-journey-tests@main
        with:
          management-be: ${{ github.sha }}
          management-fe: ${{ steps.build-fe.outputs.tag }}
          branch: ${{ steps.e2e-branch.outputs.ref }}

    ## SonarCloud
    ## Uncomment to unable SonarCloud scan
    ## Requires project to be set up in SonarCloud
    ## and the SonarCloud token to be set in the repository secrets
